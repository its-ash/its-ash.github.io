<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashvini Jangid</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0">
                <span style="color: var(--cyber-pink);">&gt;</span> Ashvini Jangid
            </span>
            <div class="auto-save-indicator d-none" id="autoSaveIndicator">
                <span style="animation: pulse 1s infinite;">◉</span> Sync
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Editor Section -->
            <div class="col-lg-6 col-md-12 mb-3 order-md-1 order-2">
                <div class="editor-container">
                    <label for="htmlEditor"></label><textarea id="htmlEditor"></textarea>
                </div>
            </div>
            
            <!-- Output Section -->
            <div class="col-lg-6 col-md-12 mb-3 order-1 order-md-2 h-100">
                <div class="editor-container output-container">
                    <div id="output" class="output-frame"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>

    <script>
        // Initialize CodeMirror
        const editor = CodeMirror.fromTextArea(document.getElementById('htmlEditor'), {
            mode: 'htmlmixed',
            theme: 'monokai',
            lineNumbers: true,
            autoCloseTags: true,
            autoCloseBrackets: true,
            matchBrackets: true,
            indentUnit: 2,
            lineWrapping: true,
            extraKeys: {
                'Ctrl-Space': 'autocomplete',
                'Cmd-/': 'toggleComment',
                'Ctrl-/': 'toggleComment'
            }
        });

        // Default Ashvini Jangid portfolio HTML
        const defaultHTML = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashvini Jangid</title>
    <style>
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="profile-img-wrapper">
                <img src="https://its-ash.github.io/morty.png" alt="Ashvini Jangid" class="profile-img">
            </div>
            <h1>Ashvini Jangid</h1>
            <p class="subtitle">Full-Stack Developer</p>
            <p class="description">// Building scalable solutions with modern technologies</p>
        </div>

        <div class="divider"></div>

        <div class="tech-grid">
            <div class="tech-card">
                <div class="tech-icon" style="color: #f7df1e;">⬢</div>
                <div class="tech-name">JavaScript</div>
                <div class="tech-desc">Vue • React</div>
            </div>
            <div class="tech-card">
                <div class="tech-icon" style="color: #ce422b;">◈</div>
                <div class="tech-name">Rust</div>
                <div class="tech-desc">APIs • CLI</div>
            </div>
            <div class="tech-card">
                <div class="tech-icon" style="color: #00add8;">⬟</div>
                <div class="tech-name">Go</div>
                <div class="tech-desc">Microservices</div>
            </div>
            <div class="tech-card">
                <div class="tech-icon" style="color: #4b8bbe;">◆</div>
                <div class="tech-name">Python</div>
                <div class="tech-desc">ML • Django • FastAPI</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="contact-section">
            <a href="mailto:ashvini.jangid@email.com" class="contact-btn">[ Email ]</a>
            <a href="https://github.com/its-ash" class="contact-btn">[ GitHub ]</a>
            <a href="https://www.linkedin.com/in/ashvinijangid/" class="contact-btn">[ LinkedIn ]</a>
            <a href="https://www.canva.com/design/DAEF9SNL7Is/StxhrgvjJZJulsUo62asog/view" class="contact-btn">[ Resume ]</a>
        </div>
    </div>
</body>
</html>`;

        // Set default content
        editor.setValue(defaultHTML);

        // Function to run the code
        function runCode() {
            const code = editor.getValue();
            const output = document.getElementById('output');
            
            // Write HTML directly to div using innerHTML
            output.innerHTML = code;
        }

        // Auto-run on load
        window.addEventListener('load', function() {
            setTimeout(runCode, 500);
        });

        // Optional: Auto-run on editor change (with debounce)
        let timeout;
        editor.on('change', function() {
            clearTimeout(timeout);
            timeout = setTimeout(runCode, 1000);
        });

        // Handle keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });
    </script>
</body>
</html>
