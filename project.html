<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Projects | Ashvini Jangid</title>
        <meta name="description" content="Terminal project registry with live preview panes and direct launch links.">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=JetBrains+Mono:wght@400;600;700;800&family=VT323&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
</head>

<body>
        <main class="page">
                <section class="hero">
                        <div>
                                <p class="prompt">$ ls /deployments --active</p>
                                <h1 class="typewriter">PROJECT REGISTRY // LIVE TARGETS █</h1>
                                <p>Each entry is rendered as a sandbox pane. Use OPEN to launch direct domain access in a fresh tab.</p>
                        </div>
                        <a class="home-link" href="index.html">cd ~/home</a>
                </section>

                <section class="projects-grid" id="projectsGrid" aria-live="polite"></section>

                <p class="note">
                        [warn] some hosts deny iframe embedding by policy headers. use OPEN for direct route.
                </p>
        </main>

        <script>
                const websiteUrls = [
                        "https://fxopspro.com/",
                        "https://flavourdiem.com/",
                        "https://scenta.in",
                        "https://marutiayurveda.in",
                        "https://phiindia.org/",
                        "https://sdp.foxapi.live/",
                        "https://alanowarinternational.com/"
                ];

                const projectsGrid = document.getElementById("projectsGrid");

                const normalizeUrl = (url) => {
                        try {
                                return new URL(url).toString();
                        } catch {
                                return null;
                        }
                };

                const hostnameFromUrl = (url) => {
                        try {
                                return new URL(url).hostname;
                        } catch {
                                return "Invalid URL";
                        }
                };

                const createProjectCard = (url, index) => {
                        const safeUrl = normalizeUrl(url);
                        const card = document.createElement("article");
                        card.className = "project-card";
                        card.style.animationDelay = `${index * 70}ms`;

                        if (!safeUrl) {
                                card.innerHTML = `
          <div class="project-meta">
            <h2 class="project-title">${url}</h2>
          </div>
          <div style="padding: 16px;">
                                                <span class="error-chip">[ERR] skipped: invalid url format</span>
          </div>
        `;
                                return card;
                        }

                        const host = hostnameFromUrl(safeUrl);
                        card.innerHTML = `
        <div class="project-meta">
          <h2 class="project-title">${host}</h2>
                                        <a class="visit-link" href="${safeUrl}" target="_blank" rel="noreferrer">open</a>
        </div>
        <iframe
          class="project-frame"
          src="${safeUrl}"
          title="Preview of ${host}"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      `;

                        return card;
                };

                if (websiteUrls.length === 0) {
                        projectsGrid.innerHTML = '<span class="error-chip">[ERR] no project urls configured</span>';
                } else {
                        websiteUrls.forEach((url, index) => {
                                projectsGrid.appendChild(createProjectCard(url, index));
                        });
                }
        </script>
</body>

</html>
